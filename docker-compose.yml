services:
  k3s-server:
    image: rancher/k3s:latest
    command: >
      server --disable-agent
      --node-external-ip ${NODE_EXTERNAL_IP:-127.0.0.1}
      --tls-san ${NODE_EXTERNAL_IP:-127.0.0.1}
    privileged: true
    environment:
      - K3S_KUBECONFIG_OUTPUT=/output/kubeconfig.yaml
      - K3S_KUBECONFIG_MODE=666
    volumes:
      - k3s-server-data:/var/lib/rancher/k3s
      - ./output:/output
    ports:
      - "6443:6443"
      - "8472:8472/udp"
    restart: unless-stopped

volumes:
  k3s-server-data: {}
